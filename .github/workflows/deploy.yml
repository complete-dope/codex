name: Build & Deploy Hugo (PaperMod) to gh-pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Give the GITHUB_TOKEN permission to push to branches and update Pages
permissions:
  contents: write
  pages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Fetch Hugo modules (tolerate failure)
        run: |
          hugo mod get -u || true
          hugo mod tidy || true

      - name: Build site
        run: hugo --minify

      - name: Prevent Jekyll processing
        run: touch public/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_dir: ./public
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
