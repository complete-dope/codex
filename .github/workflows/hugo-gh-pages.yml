name: Build & Deploy Hugo (PaperMod) to gh-pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Ensure theme and config presence (debug)
        run: |
          echo "Root files:" && ls -la
          echo "Themes:" && ls -la themes || true
          echo "Config:" && ls -la | grep -E 'config\.(toml|yaml|yml)' || true

      - name: Fetch Hugo modules (tolerant)
        run: |
          hugo mod get -u || true
          hugo mod tidy || true

      - name: Build site
        run: hugo --minify

      - name: Prevent Jekyll (add .nojekyll)
        run: touch public/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_dir: ./public
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
