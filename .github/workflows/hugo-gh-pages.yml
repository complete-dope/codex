name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository (primary)
      uses: actions/checkout@v3
      with:
        submodules: true

    - name: Setup Hugo (primary)
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: '0.125.1'

    - name: Setup Hugo fallback to v2 if primary fails
      if: failure()
      uses: peaceiris/actions-hugo@v2
      with:
        hugo-version: '0.125.1'

    - name: Validate Hugo installation
      run: hugo version
      if: success()

    - name: Build the site with Hugo
      run: hugo --minify
      if: success()

    - name: Build fallback without minify if fails
      run: hugo
      if: failure()

    - name: Validate if public directory is created
      run: test -d ./public && echo "Build output exists" || (echo "Build output missing" && exit 1)
      if: always()

    - name: Deploy to GitHub Pages (primary)
      uses: peaceiris/actions-gh-pages@v4
      if: success()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public

    - name: Deploy fallback using v3 if primary fails
      if: failure()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
